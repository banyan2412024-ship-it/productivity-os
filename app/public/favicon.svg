<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="100" height="100" fill="#000000" rx="8"/>

  <!-- Purple glow layer behind -->
  <text x="50" y="72" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
        font-size="68" font-weight="900" fill="#8b00ff" filter="url(#glow2)"
        letter-spacing="-4">24</text>

  <!-- Neon green main text -->
  <text x="50" y="72" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
        font-size="68" font-weight="900" fill="#00ff41" filter="url(#glow)"
        letter-spacing="-4">24</text>

  <!-- Bright white core highlight -->
  <text x="50" y="72" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
        font-size="68" font-weight="900" fill="rgba(200,255,200,0.35)"
        letter-spacing="-4">24</text>
</svg>
